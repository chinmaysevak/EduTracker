  <link rel="apple-touch-startup-image" media="(device-width: 414px)" href="./logo.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 375px)" href="./logo.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 428px)" href="./logo.png" />

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Use a relative path that works on both root and sub-paths
        const swPath = window.location.pathname.endsWith('/')
          ? 'sw.js'
          : window.location.pathname.split('/').slice(0, -1).join('/') + '/sw.js';

        navigator.serviceWorker.register('./sw.js')
          .then((registration) => {
            console.log('SW registered: ', registration);
          })
          .catch((error) => {
            console.log('SW registration failed: ', error);
          });
      });
    }
  </script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div id="root">
    <div id="app-shell" style="min-height: 100vh; background: #0a0a0f; display: flex; align-items: center; justify-content: center; font-family: 'Inter', system-ui, sans-serif;">
      <div style="text-align: center;">
        <div style="width: 56px; height: 56px; margin: 0 auto 20px; border: 3px solid rgba(59,130,246,0.15); border-top-color: #3b82f6; border-radius: 50%; animation: shell-spin 0.8s linear infinite;"></div>
        <div style="color: #e2e8f0; font-size: 20px; font-weight: 600; letter-spacing: -0.02em;">EduTrack</div>
        <div style="color: #64748b; font-size: 13px; margin-top: 6px;">Loading your dashboard...</div>
        <noscript>
          <div style="color: #f87171; margin-top: 20px; font-size: 14px;">JavaScript is required. Please enable it in your browser settings.</div>
        </noscript>
      </div>
    </div>
  </div>
  <style>
    @keyframes shell-spin { to { transform: rotate(360deg); } }
    #app-shell:only-child { display: flex; }
  </style>
  <script type="module" src="/src/main.tsx"></script>
